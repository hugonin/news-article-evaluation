<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title>Test</title>
        <link rel="stylesheet" href="/styles/resets.css">
        <link rel="stylesheet" href="/styles/base.css">
        <link rel="stylesheet" href="/styles/form.css">
        <link rel="stylesheet" href="/styles/footer.css">
    </head>

    <body>

        <div class="wrapper">
            <h1>Evaluate a news article!</h1>

            <main>
                <section class="left-col">
                    <h2>Analyze Setup</h2>
                    <form class="" onsubmit="return Client.handleSubmit(event)">
                        <label for="input">URL</label>
                        <input id="name" type="text" name="input" placeholder="Enter an URL" required>
                        <input type="submit" class="cta"  value="Submit" onclick="return Client.handleSubmit(event)" onsubmit="return Client.handleSubmit(event)">
                    </form>
                </section>
    
                <section class="right-col">
                    <p><strong>Results:</strong></p>
                    <div id="results"></div>
                </section>
            </main>

            <footer>
                <p class="footer-fineprint">&copy; 2021 | Made with <span aria-label="love" role="image">&#128150;</span>by Hugonin</p>
            </footer>

        </div>
      
        <script>
            // Check that service workers are supported
            if ('serviceWorker' in navigator) {
                // Use the window load event to keep the page load performant
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/service-worker.js');
                });
            }
           </script>

    </body>
</html>
